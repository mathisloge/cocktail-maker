name: Linux CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Concurrency group to cancel outdated CI runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-linux:
    name: Build & Test (Clang 22 / libc++)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          # Required by GetGitRevisionDescription CMake module
          fetch-depth: 0

      - name: Install System Dependencies & LLVM 22
        run: |
          sudo apt-get update
          
          # Install dependencies required by the LLVM script and Slint
          sudo apt-get install -y lsb-release wget software-properties-common gnupg \
            ninja-build libudev-dev libfontconfig1-dev libxkbcommon-dev \
            libx11-xcb-dev libwayland-dev

          # Download and run the official LLVM installation script for version 22
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22
          
          # Explicitly install LLD 22 and libc++ 22 dependencies
          sudo apt-get install -y clang-22 lld-22 libc++-22-dev libc++abi-22-dev

      - name: Install Rust Toolchain
        run: |
          # Install rustup with the minimal profile to speed up CI
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Run CMake Workflow
        run: cmake --workflow --preset ci-linux
