name: Linux CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Concurrency group to cancel outdated CI runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-linux:
    name: Build & Test (Clang 22 / libc++)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          # Required by GetGitRevisionDescription CMake module
          fetch-depth: 0

      - uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libudev-dev libx11-xcb-dev libwayland-dev libfontconfig1-dev ccache xvfb
          version: 1.0

      - name: Setup LLVM
        uses: ZhongRuoyu/setup-llvm@v0
        with:
          llvm-version: 22

      - name: Setup Rust
        run: rustup toolchain install stable --profile minimal
      - uses: Swatinem/rust-cache@v2

      - name: Setup CMake
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "~4.3.0" # cmake 4.4.0 has issues with modules

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          create-symlink: true

      - name: Run CMake Workflow
        run: xvfb-run -a cmake --workflow --preset ci-linux
