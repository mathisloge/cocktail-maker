default_install_hook_types:
  - pre-commit
  - commit-msg

repos:
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [--no-color]
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: ^(mkdocs|.clang-format)
      - id: check-added-large-files

  - repo: https://github.com/BlankSpruce/gersemi-pre-commit
    rev: 0.27.6
    hooks:
      - id: gersemi
        name: CMake linting

  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v22.1.5
    hooks:
      - id: clang-format
        types_or: [c++, c, proto]

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        exclude: ^(i18n|v2.md)

  - repo: local
    hooks:
      - id: reuse-annotate
        name: reuse-annotate
        entry: reuse annotate -l "GPL-3.0-or-later" --merge-copyrights --single-line -c "Mathis Logemann <mathis@quite.rocks>"
        additional_dependencies: ["reuse"]
        types_or: [c++, qml, proto, cmake, python, pyi]
        pass_filenames: true
        language: python
        stages: [ manual ]
